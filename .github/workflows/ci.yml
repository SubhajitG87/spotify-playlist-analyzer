name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=10 --max-line-length=100 --statistics

    - name: Check syntax
      run: |
        python -m py_compile config.py
        python -m py_compile src/__init__.py
        python -m py_compile src/spotify_client.py
        python -m py_compile src/data_analyzer.py
        python -m py_compile src/llm_analyzer.py
        python -m py_compile src/dashboard.py
        python -m py_compile src/main.py

    - name: Test imports
      env:
        SPOTIFY_CLIENT_ID: test
        SPOTIFY_CLIENT_SECRET: test
        SPOTIFY_REDIRECT_URI: http://localhost:8888/callback
        HF_API_KEY: test
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from config import Config
        from spotify_client import SpotifyClient
        from data_analyzer import DataAnalyzer
        from llm_analyzer import LLMAnalyzer
        from dashboard import Dashboard
        print('All imports OK')
        "